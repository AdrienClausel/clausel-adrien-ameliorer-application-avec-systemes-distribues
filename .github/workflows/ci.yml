name: Java CI with Maven

on:
  push:
    branches: ["dev","master"]

jobs:

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: action/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Compile
        run: mvn -B clean compile


  test:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: action/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn -B test

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build artifact
        run: mvn -B package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: tour-guide-app
          path: target/*.jar